<input type="file" id="rejFile"><br><br>

<input type="file" id="workcenterFile"><br><br>

Download Excel

<script>

function openTool(){
document.getElementById("homePage").style.display="none";
document.getElementById("wipPage").style.display="block";
}

function goHome(){
document.getElementById("homePage").style.display="block";
document.getElementById("wipPage").style.display="none";
}

function updateProgress(p){
document.getElementById("progressBar").style.width=p+"%";
document.getElementById("progressText").innerText="Progress: "+p+"%";
}

function cleanPart(part){
if(!part) return "";
part=part.toString().trim();
if(part.startsWith("0-0 ")) return part.replace("0-0 ","");
return part;
}

let finalData=[];

function readExcel(file,callback){

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let workbook=XLSX.read(data,{type:'array'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];

let json=XLSX.utils.sheet_to_json(sheet,{defval:""});

callback(json);

};

reader.readAsArrayBuffer(file);

}

function processFiles(){

let mfg=document.getElementById("mfgFile").files[0];
let rej=document.getElementById("rejFile").files[0];
let wc=document.getElementById("workcenterFile").files[0];

if(!mfg||!rej||!wc){
alert("Upload all files");
return;
}

updateProgress(20);

readExcel(mfg,function(mfgData){

updateProgress(40);

readExcel(rej,function(rejData){

updateProgress(60);

readExcel(wc,function(wcData){

updateProgress(80);

calculate(mfgData,rejData,wcData);

updateProgress(100);

});

});

});

}

function calculate(mfgData,rejData,wcData){

finalData=[];

let prevQty={};
let pendingWip=0;
let lastKey="";

mfgData.sort((a,b)=>{

let orderA=Number(a["Order no."])||0;
let orderB=Number(b["Order no."])||0;

let opA=Number(a["Op."])||0;
let opB=Number(b["Op."])||0;

return (orderA-orderB) ||
(cleanPart(a["Level/Part number"]).localeCompare(cleanPart(b["Level/Part number"]))) ||
(opA-opB);

});

mfgData.forEach(row=>{

let partNo=cleanPart(row["Level/Part number"]);
let orderNo=row["Order no."];
let wc=row["WC"];
let op=row["Op."];

let rejectionRow=rejData.find(r=>
r["M-order"]==orderNo &&
Number(r["Op."])==Number(op) &&
cleanPart(r["Part number"])==partNo
);

let wcRow = wcData.find(r => r["Work center"] == wc);
let rejection=rejectionRow?Number(rejectionRow["Rejected qty"])||0:0;

let reportQty=Number(row["Rep. qty"])||0;

let finalQty=reportQty+rejection;
let key = orderNo + "_" + partNo;

if(prevQty[key] === undefined){
    prevQty[key] = finalQty;
    pendingWip = 0;
    return;
}

let previous = prevQty[key];

let wip = Math.max(previous - finalQty, 0);

prevQty[key] = finalQty;

let dept = wcRow ? wcRow["Name"] : "";
let category = wcRow ? wcRow["Category"] : "";

if(!category || category.trim() == ""){
    pendingWip += wip;
    return;
}

wip = wip + pendingWip;
pendingWip = 0;

if(wip > 0){
    finalData.push({
        "Order No":orderNo,
        "Op No":op,
        "Part Number":partNo,
        "Work Center":wc,
        "Department":dept,
        "Category":category,
        "WIP Stock":wip
    });
}

});

document.getElementById("downloadBtn").disabled=false;

alert("Report Generated!");

}

/* ADD PIVOT FUNCTION HERE */
function createPivotMatrix(){

let parts=[...new Set(finalData.map(r=>r["Part Number"]))];
let wcs=[...new Set(finalData.map(r=>r["Work Center"]))];

let matrix=[];

let header=["Part Number"];
wcs.forEach(w=>header.push(w));
header.push("PART WISE GRNAD TOTAL");

matrix.push(header);

parts.forEach(p=>{

let row=[p];
let rowTotal=0;

wcs.forEach(w=>{

let val=finalData
.filter(r=>r["Part Number"]==p && r["Work Center"]==w)
.reduce((s,r)=>s+Number(r["WIP Stock"]),0);

row.push(val);
rowTotal+=val;

});

row.push(rowTotal);
matrix.push(row);

});

let totalRow=["WC WISE GRAND TOTAL"];

for(let i=0;i<wcs.length;i++){

let colTotal=0;

parts.forEach(p=>{

let val=finalData
.filter(r=>r["Part Number"]==p && r["Work Center"]==wcs[i])
.reduce((s,r)=>s+Number(r["WIP Stock"]),0);

colTotal+=val;

});

totalRow.push(colTotal);

}

let grandTotal=totalRow.slice(1).reduce((a,b)=>a+b,0);
totalRow.push(grandTotal);

matrix.push(totalRow);

return matrix;

}

/* DOWNLOAD FUNCTION */
function downloadExcel(){

if(finalData.length===0){
alert("No Data");
return;
}

let wb=XLSX.utils.book_new();

/* Sheet 1 */

let sheet1=XLSX.utils.json_to_sheet(finalData);
XLSX.utils.book_append_sheet(wb,sheet1,"WIP_Details");

/* Sheet 2 Pivot */

let pivot=createPivotMatrix();

let sheet2=XLSX.utils.aoa_to_sheet(pivot);

XLSX.utils.book_append_sheet(wb,sheet2,"WIP_Pivot");

XLSX.writeFile(wb,"WIP_Report.xlsx");

}

</script>
